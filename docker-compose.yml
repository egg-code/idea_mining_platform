services:

  postgres: # Database service using PostgreSQL 16 
    image: postgres:16
    container_name: idea_mining_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: super_admin
      POSTGRES_DB: app_ideas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d # Initialize the database with schema and tables according to /init-db/init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d app_ideas"] # Check if PostgreSQL is ready to accept connections
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped # Restart the container unless it is explicitly stopped

  ollama: # Ollama service for data processing
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=24h        # Keep model in memory
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3

  #deploy:                          #Enable GPU Hardware Acceleration if available
  #    resources:
  #      reservations:
  #        devices:
  #          - driver: nvidia
  #            count: 1
  #            capabilities: [gpu]

  # ollama-init: # One-shot service to initialize Ollama
  #   image: ollama/ollama:latest      #Keep reusing this image
  #   container_name: ollama_init
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   environment:
  #     - OLLAMA_HOST=http://ollama:11434
  #   command: pull ${LLM_MODEL}
  #   restart: "no"

# --Ingestion: Reddit -> raw.subreddit_data --
  ingest:
    build: .
    container_name: pipeline_ingest
    depends_on:
      postgres:
        condition: service_healthy
    env_file: # Load environment variables from the local .env file for database and Reddit API configuration
      - .env
    # Runs as a one-shot command, not a long-running service
    command: ["python", "main.py", "--mode", "ingest"]

# --LLM Enrichment: staging.cleaned_reddit -> staging.llm_outputs --
  llm:
    build: .
    container_name: pipeline_llm
    volumes:
      - .:/app # Mount the current directory to /app in the container
    depends_on:
      postgres:
        condition: service_healthy
      # ollama-init:
      #   condition: service_completed_successfully
    env_file: # Load environment variables from the local .env file for LLM configuration
      - .env
    command: ["python", "main.py", "--mode", "llm"]


  reddit_pipeline: # Service for running the Reddit data extraction pipeline
    build: .
    container_name: pipeline_runner
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file: # Load environment variables from the local .env file for database and Reddit API configuration
      - .env
    # Runs as a one-shot command, not a long-running service
    command: ["python", "main.py", "--mode", "ingest"]


  dbt: # Service for running dbt transformations
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    container_name: dbt_transformer
    tty: true
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app
    environment:
      - DBT_PROFILES_DIR=/usr/app
    depends_on:
      postgres:
        condition: service_healthy


  dashboard: # Service for running the Streamlit dashboard
    build:
      context: ./dashboard
    container_name: dashboard
    ports:
      - "8501:8501" # Expose the Streamlit dashboard on port 8501 so that each container can be accessed independently
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=app_ideas
      - DB_USER=admin
      - DB_PASSWORD=super_admin
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data: